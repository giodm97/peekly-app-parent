name: Autonomous Issue Implementation

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  implement:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "Peekly Bot"
          git config user.email "dimaio.giuseppe@outlook.com"
          git remote set-url origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Implement pending issues
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          for issue_file in issues/*.md; do
            status=$(grep '^status:' "$issue_file" | awk '{print $2}')
            [ "$status" = "pending" ] || continue

            title=$(grep '^title:' "$issue_file" | sed 's/^title:[[:space:]]*//' | tr -d '"')
            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | cut -c1-50 | sed 's/-$//')
            branch="feat/$slug"

            echo "=== Processing: $title ==="

            git checkout develop
            git checkout -b "$branch"

            {
              printf 'You are implementing a GitHub issue for the Peekly parent Android app (Kotlin/Jetpack Compose).\n'
              printf 'The repo is at the current working directory.\n'
              printf 'Existing design system: warm cream/orange palette in app/src/main/java/com/peekly/parent/ui/theme/Color.kt.\n'
              printf 'Follow all conventions from existing files. Do not add comments unless necessary.\n'
              printf 'Do NOT run git commands -- the CI pipeline handles commits and pushes.\n\n'
              printf 'Issue to implement:\n'
              cat "$issue_file"
            } > /tmp/claude_prompt.txt

            claude --dangerously-skip-permissions -p "$(cat /tmp/claude_prompt.txt)"

            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

            if git diff --cached --quiet && git diff --quiet; then
              echo "No changes produced — skipping $title"
              git checkout develop
              git branch -D "$branch"
              continue
            fi

            git add -A
            commit_msg=$(printf '%s\n\nCo-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>' "$title")
            git commit -m "$commit_msg"

            git push origin "$branch"

            cat "$issue_file" > /tmp/pr_body.txt
            pr_url=$(gh pr create --base develop --title "$title" --body-file /tmp/pr_body.txt --label enhancement)

            sed -i 's/^status: pending/status: done/' "$issue_file"
            printf 'pr: %s\n' "$pr_url" >> "$issue_file"

            git add "$issue_file"
            git commit -m "Mark issue done: $title"
            git push origin "$branch"

            echo "PR opened: $pr_url"
          done
